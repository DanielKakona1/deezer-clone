name: Mobile E2E (Maestro)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/e2e-mobile.yml'

jobs:
  mobile-e2e:
    name: Android Emulator + Maestro
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start backend API
        run: pnpm --filter @deezer-mobile-clone/backend exec tsx src/server.ts &

      - name: Run Expo app on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          EXPO_PUBLIC_API_URL: http://10.0.2.2:3333/api
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            cd apps/mobile
            pnpm expo start --android --non-interactive --clear --localhost &
            sleep 60
            maestro test .maestro/search-artist-flow.yaml
