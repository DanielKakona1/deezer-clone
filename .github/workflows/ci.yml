name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm format

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter @deezer-mobile-clone/backend lint

      - name: Typecheck backend
        run: pnpm --filter @deezer-mobile-clone/backend typecheck

      - name: Run backend unit tests
        run: pnpm --filter @deezer-mobile-clone/backend test:unit

      - name: Run backend integration tests
        run: pnpm --filter @deezer-mobile-clone/backend test:integration

  mobile-checks:
    name: Mobile Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint mobile
        run: pnpm --filter @deezer-mobile-clone/mobile lint

      - name: Typecheck mobile
        run: pnpm --filter @deezer-mobile-clone/mobile typecheck

      - name: Run mobile unit tests
        run: pnpm --filter @deezer-mobile-clone/mobile test:unit

      - name: Run mobile integration tests
        run: pnpm --filter @deezer-mobile-clone/mobile test:integration
